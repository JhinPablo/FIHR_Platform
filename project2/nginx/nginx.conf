worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
  limit_req_status 429;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream frontend_upstream {
    server frontend:5173;
  }

  upstream backend_upstream {
    server backend:8000;
  }

  upstream ml_upstream {
    server ml-service:8011;
  }

  upstream dl_upstream {
    server dl-service:8012;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: http://localhost:9000 http://localhost:8000; connect-src 'self' http://localhost:8000 http://localhost:8011 http://localhost:8012 http://localhost:9000 ws://localhost:*; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location /api/ {
      limit_req zone=api_limit burst=40 nodelay;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://backend_upstream;
    }

    location /ml/ {
      limit_req zone=api_limit burst=20 nodelay;
      rewrite ^/ml/(.*)$ /$1 break;
      proxy_pass http://ml_upstream;
    }

    location /dl/ {
      limit_req zone=api_limit burst=20 nodelay;
      rewrite ^/dl/(.*)$ /$1 break;
      proxy_pass http://dl_upstream;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host frontend:5173;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://frontend_upstream;
    }
  }
}
