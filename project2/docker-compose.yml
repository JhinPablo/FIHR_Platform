services:

  # ── Storage ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET:        ${MINIO_BUCKET:-clinical-images}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET || true;
      mc anonymous set download local/$$MINIO_BUCKET || true;
      printf '{\"CORSRules\":[{\"ID\":\"browser\",\"AllowedHeaders\":[\"*\"],\"AllowedMethods\":[\"GET\",\"HEAD\"],\"AllowedOrigins\":[\"*\"],\"MaxAgeSeconds\":3600}]}' > /tmp/cors.json;
      mc cors set --rules-config-file /tmp/cors.json local/$$MINIO_BUCKET || true;
      echo 'Bucket ready.';
      "
    restart: on-failure

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false   # falls back to config.py defaults (SQLite + dev keys)
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live reload of Python source
      - ./scripts:/scripts:ro
      - ./datasets:/datasets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 20s
    restart: on-failure

  # ── AI Services ──────────────────────────────────────────────────────────
  ml-service:
    build: ./ml-service
    env_file:
      - path: .env
        required: false
    ports:
      - "8011:8011"
    volumes:
      - ./ml-service:/app       # live reload of ML source
      - ml_models:/app/models   # persist trained ONNX across restarts
    command: uvicorn main:app --host 0.0.0.0 --port 8011 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure

  dl-service:
    build: ./dl-service
    env_file:
      - path: .env
        required: false
    ports:
      - "8012:8012"
    volumes:
      - ./dl-service:/app       # live reload of DL source
    command: uvicorn main:app --host 0.0.0.0 --port 8012 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8012/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: c2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      dl-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (Vite dev — hot-reload) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules   # persist node_modules across restarts
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  # ── Seed (run manually: docker compose --profile seed run --rm seed) ─────
  seed:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL:       http://backend:8000
      MIMIC_IV_ROOT:      /datasets/mimic-iv
      MIMIC_CXR_ROOT:     /datasets/mimic-cxr-jpg
      SEED_LIMIT_SUBJECTS: ${SEED_LIMIT_SUBJECTS:-30}
      SEED_MAX_IMAGES:    ${SEED_MAX_IMAGES:-30}
      SEED_MAX_LABS_PER_SUBJECT: ${SEED_MAX_LABS_PER_SUBJECT:-8}
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./datasets:/datasets:ro
    command: >
      python /scripts/seed_mimic.py
      --mimic-iv-root /datasets/mimic-iv
      --mimic-cxr-root /datasets/mimic-cxr-jpg
      --limit-subjects ${SEED_LIMIT_SUBJECTS:-30}
      --max-labs-per-subject ${SEED_MAX_LABS_PER_SUBJECT:-8}
      --max-images ${SEED_MAX_IMAGES:-30}
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - seed
    restart: "no"

volumes:
  minio_data:
  frontend_nm:    # node_modules cache for Vite dev container
  ml_models:      # persists trained ONNX model across ml-service restarts
