services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-clinical-images}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      mc mb -p local/$$MINIO_BUCKET || true;
      mc anonymous set none local/$$MINIO_BUCKET || true;
      "

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./datasets:/datasets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - minio

  seed:
    build: ./backend
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
      SEED_DATA_DIR: /datasets/local-demo
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./datasets:/datasets:ro
    command: python /scripts/seed_local_datasets.py
    depends_on:
      - backend
    profiles:
      - seed

  ml-service:
    build: ./ml-service
    ports:
      - "8011:8011"

  dl-service:
    build: ./dl-service
    ports:
      - "8012:8012"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  minio_data:
